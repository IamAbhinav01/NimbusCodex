# =============================================================================
# NimbusCodex – docker-compose.yml
#
# Phase 1:  postgres + redis are ACTIVE
# Phase 2+: All other services are COMMENTED OUT as placeholders.
#           Uncomment each service as its phase is implemented.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # DATABASE – PostgreSQL 16
  # Phase 1 — ACTIVE
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # CACHE / QUEUE – Redis 7 with AOF persistence
  # Phase 1 — ACTIVE
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3


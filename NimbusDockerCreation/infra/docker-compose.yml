  # ---------------------------------------------------------------------------
  # ORCHESTRATOR – Phase 2 ACTIVE
  # Manages container lifecycle; needs Docker socket access.
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ../services/orchestrator
    ports:
      - "4002:4002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

